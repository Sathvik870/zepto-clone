apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zepto-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Sathvik870/zepto-clone.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
